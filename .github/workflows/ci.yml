name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jibon
          POSTGRES_PASSWORD: jibon
          POSTGRES_DB: jibon_sathu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jibon -d jibon_sathu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://jibon:jibon@127.0.0.1:5432/jibon_sathu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Migrations
        run: alembic upgrade head
      - name: Pytest
        run: pytest -q
