services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jibon
      POSTGRES_PASSWORD: jibon
      POSTGRES_DB: jibon_sathu
    # Host 5433 avoids clashing with a local PostgreSQL install on 5432 (common on dev PCs).
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jibon -d jibon_sathu"]
      interval: 5s
      timeout: 5s
      retries: 5
